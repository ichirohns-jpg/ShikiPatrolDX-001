<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>志木パトロールDX 投稿一覧</title>

<meta name="description" content="志木パトロールDX 投稿一覧ページ">

<meta property="og:title" content="志木パトロールDX">
<meta property="og:description" content="地域の異常情報を確認できます">
<meta property="og:image" content="https://ichirohns-jpg.github.io/ShikiPatrolDX-001/top.jpg">
<meta property="og:url" content="https://ichirohns-jpg.github.io/ShikiPatrolDX-001/app.html">
<meta property="og:type" content="website">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef5fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}

.header{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:14px;
}

.top-image{
  width:100%;
  border-radius:24px;
  display:block;
  box-shadow:0 6px 20px rgba(0,0,0,.15);
}

.wrap{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:0 14px 80px;
}

.title{
  font-size:34px;
  font-weight:900;
  margin:20px 0 10px;
  color:#0c3c66;
}

.desc{
  font-size:17px;
  line-height:1.8;
  margin-bottom:24px;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:18px;
  margin-bottom:24px;
  box-shadow:0 6px 20px rgba(0,0,0,.12);
}

.kind{
  display:inline-block;
  background:#dff0ff;
  color:#005a9c;
  font-weight:800;
  font-size:14px;
  padding:7px 12px;
  border-radius:999px;
  margin-bottom:12px;
}

.date{
  font-size:14px;
  color:#587086;
  margin-bottom:12px;
}

.detail{
  font-size:18px;
  line-height:1.8;
  margin-bottom:16px;
  white-space:pre-wrap;
}

.photo{
  width:100%;
  border-radius:18px;
  margin-bottom:14px;
  background:#d9e7f2;
}

.status{
  display:inline-block;
  margin-top:10px;
  background:#eef7e9;
  color:#257942;
  padding:8px 14px;
  border-radius:999px;
  font-weight:800;
  font-size:14px;
}

.map-btn{
  display:block;
  width:100%;
  text-align:center;
  background:linear-gradient(135deg,#0a84ff,#005bbb);
  color:#fff;
  text-decoration:none;
  padding:16px;
  border-radius:16px;
  font-size:18px;
  font-weight:900;
  margin-top:16px;
}

.loading{
  text-align:center;
  font-size:20px;
  padding:50px 20px;
  color:#4b6880;
}

.empty{
  text-align:center;
  background:#fff;
  padding:40px 20px;
  border-radius:20px;
  font-size:18px;
}

.footer{
  text-align:center;
  color:#678095;
  font-size:13px;
  padding:30px 10px 60px;
}
</style>
</head>

<body>

<div class="header">
  <img src="top.jpg" class="top-image">
</div>

<div class="wrap">

  <div class="title">
    志木パトロールDX
  </div>

  <div class="desc">
    投稿された地域情報を確認できます。<br>
    道路の穴、街灯切れ、不法投棄などを一覧表示しています。
  </div>

  <div id="list">
    <div class="loading">
      読み込み中...
    </div>
  </div>

</div>

<div class="footer">
  志木パトロールDX
</div>

<script>
const SHEET_ID = '1393zzt2GgqS5v0Hsdtu-3w0ntM3ff2KG0kOOPBaxHk4';
const SHEET_NAME = '志木パトロールDX';

const JSONP_URL =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=' +
encodeURIComponent(SHEET_NAME) +
'&tqx=out:json;responseHandler=handleSheet';

function loadSheet(){
  const script = document.createElement('script');
  script.src = JSONP_URL;
  document.body.appendChild(script);
}

window.handleSheet = function(json){

  const rows = json.table.rows || [];
  const list = document.getElementById('list');

  if(!rows.length){
    list.innerHTML = `
      <div class="empty">
        まだ投稿はありません
      </div>
    `;
    return;
  }

  let html = '';

  rows.reverse().forEach((r)=>{

    const c = r.c || [];

    const date = getCell(c,0);
    const kind = getCell(c,1);
    const detail = getCell(c,2);
    const photo = getCell(c,3);
    const location = getCell(c,4);
    const status = getCell(c,5);

    const mapUrl = buildMapUrl(location);

    html += `
      <div class="card">

        <div class="kind">
          ${escapeHtml(kind)}
        </div>

        <div class="date">
          ${escapeHtml(date)}
        </div>

        <div class="detail">
          ${escapeHtml(detail)}
        </div>

        ${
          photo
          ? `<img class="photo" src="${photo}" loading="lazy">`
          : ''
        }

        ${
          status
          ? `<div class="status">${escapeHtml(status)}</div>`
          : ''
        }

        ${
          mapUrl
          ? `<a class="map-btn" href="${mapUrl}" target="_blank">
              Googleマップを見る
             </a>`
          : ''
        }

      </div>
    `;
  });

  list.innerHTML = html;
};

function getCell(c,i){
  return c[i] && c[i].v ? String(c[i].v) : '';
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function buildMapUrl(location){

  if(!location) return '';

  if(location.includes(',')){
    return 'https://maps.google.com/?q=' + encodeURIComponent(location);
  }

  return '';
}

loadSheet();
</script>

</body>
</html>
