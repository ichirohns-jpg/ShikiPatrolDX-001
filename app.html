<script>
const GAS_URL =
'https://script.google.com/macros/s/AKfycbys6bU-HEVqwzYuFrckbc1yEY2wv8MU1r0oqW9XvePaBRFK8rBojj3_Dl5P-eahMvkS/exec';

const X_TEXT =
'志木パトロールDX%0A地域の危険箇所を写真と地図で確認できます。';

function loadData(){

  const script = document.createElement('script');

  script.src =
    GAS_URL +
    '?callback=handlePatrolData&_=' +
    Date.now();

  script.onerror = function(){

    showError('データを取得できませんでした');

  };

  document.body.appendChild(script);

}



window.handlePatrolData = function(res){

  if(!res || !res.ok){

    showError('データ取得エラー');

    return;

  }

  const list = document.getElementById('list');

  if(!res.data || res.data.length === 0){

    list.innerHTML =
      '<div class="error">投稿がありません</div>';

    return;

  }

  let html = '';



  res.data.forEach((item,index) => {

    const no =
      String(index + 1).padStart(3,'0');

    const SHARE_URL =
      'https://ichirohns-jpg.github.io/ShikiPatrolDX-001/share-' +
      no +
      '.html';



    const statusClass =
      getStatusClass(item.status);



    const copyText =
      '志木パトロールDX\n' +
      (item.kind || '地域情報') + '\n' +
      (item.detail || '') + '\n' +
      SHARE_URL;



    html += `

      <div class="card">

        <div class="kind">

          ${escapeHtml(item.kind || '地域情報')}

        </div>

        <div class="date">

          ${escapeHtml(item.date || '')}

        </div>

        <div class="info-box">

          <div class="info-label">

            内容

          </div>

          <div class="info-text">

            ${escapeHtml(item.detail || '詳細内容は未入力です。')}

          </div>

        </div>

        ${
          item.photoUrl
          ? `<img src="${item.photoUrl}" class="photo">`
          : ''
        }

        <div class="status ${statusClass}">

          ${escapeHtml(item.status || '未対応')}

        </div>

        ${
          item.location
          ? `
          <a
            href="https://maps.google.com/?q=${encodeURIComponent(item.location)}"
            target="_blank"
            class="map-btn">

            Googleマップを見る

          </a>
          `
          : ''
        }

        <div class="share-box">

          <div class="share-title">

            この記事を共有

          </div>

          <div class="share-grid">

            <button
              class="share-btn copy-btn"
              onclick="copyShare('${encodeURIComponent(copyText)}')">

              URLコピー

            </button>

            <a
              class="share-btn fb-btn"
              target="_blank"
              href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(SHARE_URL)}">

              Facebook

            </a>

            <a
              class="share-btn line-btn"
              target="_blank"
              href="https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(SHARE_URL)}">

              LINE

            </a>

            <a
              class="share-btn x-btn"
              target="_blank"
              href="https://twitter.com/intent/tweet?text=${X_TEXT}&url=${encodeURIComponent(SHARE_URL)}">

              X

            </a>

          </div>

        </div>

      </div>

    `;

  });

  list.innerHTML = html;

};



function copyShare(encodedText){

  const text = decodeURIComponent(encodedText);

  if(navigator.clipboard){

    navigator.clipboard.writeText(text)

    .then(function(){

      alert('投稿文とURLをコピーしました');

    })

    .catch(function(){

      prompt('コピーしてください', text);

    });

  }else{

    prompt('コピーしてください', text);

  }

}



function getStatusClass(status){

  const s = String(status || '');

  if(s.includes('済')) return 'green';

  if(s.includes('中')) return 'yellow';

  if(s.includes('未')) return 'red';

  return 'blue';

}



function escapeHtml(str){

  return String(str || '')

    .replace(/&/g,'&amp;')

    .replace(/</g,'&lt;')

    .replace(/>/g,'&gt;');

}



function showError(msg){

  document.getElementById('list').innerHTML =

    '<div class="error">' +

    escapeHtml(msg) +

    '</div>';

}



loadData();

</script>
