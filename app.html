<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>志木パトロールDX 投稿一覧</title>

<meta property="og:title" content="志木パトロールDX">
<meta property="og:description" content="地域の異常情報を確認できます">
<meta property="og:image" content="https://ichirohns-jpg.github.io/ShikiPatrolDX-001/top.jpg">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef5fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}

.wrap{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:14px 14px 80px;
}

.top-image{
  width:100%;
  border-radius:24px;
  display:block;
  margin-bottom:24px;
  box-shadow:0 6px 20px rgba(0,0,0,.15);
}

.title{
  font-size:34px;
  font-weight:900;
  line-height:1.3;
  margin-bottom:16px;
  color:#0c3c66;
}

.desc{
  font-size:18px;
  line-height:1.8;
  margin-bottom:28px;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:18px;
  margin-bottom:24px;
  box-shadow:0 6px 18px rgba(0,0,0,.12);
}

.kind{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  font-size:15px;
  font-weight:900;
  margin-bottom:12px;
  background:#dfefff;
  color:#005bbb;
}

.date{
  font-size:14px;
  color:#678095;
  margin-bottom:12px;
}

.detail{
  font-size:18px;
  line-height:1.8;
  margin-bottom:16px;
  white-space:pre-wrap;
}

.photo{
  width:100%;
  border-radius:18px;
  display:block;
  margin-bottom:16px;
  background:#d9e7f2;
}

.status{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  font-size:14px;
  font-weight:900;
  margin-top:6px;
}

.status.red{
  background:#ffe2e2;
  color:#c20000;
}

.status.yellow{
  background:#fff3d9;
  color:#a86b00;
}

.status.green{
  background:#def7df;
  color:#147a28;
}

.map-btn{
  display:block;
  width:100%;
  text-align:center;
  text-decoration:none;
  background:linear-gradient(135deg,#0a84ff,#005bbb);
  color:#fff;
  font-size:18px;
  font-weight:900;
  padding:16px;
  border-radius:16px;
  margin-top:18px;
}

.loading{
  text-align:center;
  font-size:22px;
  color:#678095;
  padding:50px 20px;
}

.empty{
  background:#fff;
  border-radius:24px;
  padding:40px 20px;
  text-align:center;
  font-size:18px;
}

.footer{
  text-align:center;
  color:#678095;
  font-size:13px;
  padding-top:20px;
}
</style>
</head>

<body>

<div class="wrap">

<img src="top.jpg" class="top-image">

<div class="title">
志木パトロールDX
</div>

<div class="desc">
投稿された地域情報を確認できます。<br>
道路の穴、街灯切れ、不法投棄などを一覧表示しています。
</div>

<div id="list">
  <div class="loading">
    読み込み中...
  </div>
</div>

<div class="footer">
志木パトロールDX
</div>

</div>

<script>

const JSONP_URL =
'https://docs.google.com/spreadsheets/d/1393zzt2GgqS5v0Hsdtu-3w0ntM3ff2KG0kOOPBaxHk4/gviz/tq?sheet=志木パトロールDX&tqx=out:json&responseHandler=handleSheet';

function loadSheet(){
  const script = document.createElement('script');
  script.src = JSONP_URL;
  document.body.appendChild(script);
}

window.handleSheet = function(json){

  const rows = json.table.rows || [];
  const list = document.getElementById('list');

  if(rows.length === 0){
    list.innerHTML = `
      <div class="empty">
        投稿はまだありません
      </div>
    `;
    return;
  }

  let html = '';

  rows.reverse().forEach(r => {

    const c = r.c || [];

    const date = getCell(c,0);
    const kind = getCell(c,1);
    const detail = getCell(c,2);
    const photo = getCell(c,3);
    const location = getCell(c,4);
    const status = getCell(c,5);

    const mapUrl = buildMap(location);

    let statusClass = 'yellow';

    if(status.includes('未')){
      statusClass = 'red';
    }

    if(status.includes('済')){
      statusClass = 'green';
    }

    html += `
      <div class="card">

        <div class="kind">
          ${escapeHtml(kind)}
        </div>

        <div class="date">
          ${escapeHtml(date)}
        </div>

        <div class="detail">
          ${escapeHtml(detail)}
        </div>

        ${
          photo
          ? `<img src="${photo}" class="photo">`
          : ''
        }

        ${
          status
          ? `<div class="status ${statusClass}">
               ${escapeHtml(status)}
             </div>`
          : ''
        }

        ${
          mapUrl
          ? `<a href="${mapUrl}" class="map-btn" target="_blank">
               Googleマップを見る
             </a>`
          : ''
        }

      </div>
    `;
  });

  list.innerHTML = html;
};

function getCell(c,i){
  return c[i] && c[i].v ? String(c[i].v) : '';
}

function buildMap(location){

  if(!location) return '';

  return 'https://maps.google.com/?q=' +
    encodeURIComponent(location);
}

function escapeHtml(str){

  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

loadSheet();

</script>

</body>
</html>
