<title>志木パトロールDX</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#eef5fb;font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;color:#17324d}
.wrap{width:100%;max-width:760px;margin:0 auto;padding:14px 10px 80px}
.top-image{width:100%;border-radius:22px;display:block;margin-bottom:22px;box-shadow:0 6px 20px rgba(0,0,0,.15)}
.title{font-size:34px;font-weight:900;line-height:1.3;margin-bottom:14px;color:#0c3c66}
.desc{font-size:18px;line-height:1.7;margin-bottom:22px}
.nav{display:flex;gap:10px;margin-bottom:22px}
.nav a{flex:1;text-align:center;text-decoration:none;font-size:21px;font-weight:900;padding:17px 8px;border-radius:17px;color:#fff}
.home-btn{background:#617890}
.post-btn{background:linear-gradient(135deg,#1d93ff,#0068d9)}
.card{background:#fff;border-radius:22px;padding:16px;margin-bottom:22px;box-shadow:0 6px 18px rgba(0,0,0,.12);text-align:left;overflow:hidden}
.kind{display:inline-block;padding:9px 15px;border-radius:999px;font-size:18px;font-weight:900;margin-bottom:14px;background:#dfefff;color:#005bbb}
.date{font-size:16px;color:#678095;margin-bottom:14px}
.info-box{background:#f6fbff;border:1px solid #d8eaf8;border-radius:18px;padding:14px;margin-bottom:18px}
.info-label{font-size:15px;font-weight:900;color:#0c5f9c;margin-bottom:8px}
.info-text{font-size:20px;line-height:1.75;color:#17324d;text-align:left;word-break:normal;overflow-wrap:break-word}
.photo{width:100%;display:block;border-radius:20px;margin-bottom:20px;background:#d9e7f2}
.status{display:inline-block;padding:10px 16px;border-radius:999px;font-size:18px;font-weight:900;margin-top:8px}

.yellow{background:#fff3d9;color:#9a6400}
.green{background:#def7df;color:#147a28}
