<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>志木パトロールDX</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#eef5fb;font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;color:#17324d}
.wrap{width:100%;max-width:760px;margin:0 auto;padding:14px 10px 80px}
.top-image{width:100%;border-radius:22px;display:block;margin-bottom:22px;box-shadow:0 6px 20px rgba(0,0,0,.15)}
.title{font-size:34px;font-weight:900;line-height:1.3;margin-bottom:14px;color:#0c3c66}
.desc{font-size:18px;line-height:1.7;margin-bottom:22px}
.nav{display:flex;gap:10px;margin-bottom:22px}
.nav a{flex:1;text-align:center;text-decoration:none;font-size:21px;font-weight:900;padding:17px 8px;border-radius:17px;color:#fff}
.home-btn{background:#617890}
.post-btn{background:linear-gradient(135deg,#1d93ff,#0068d9)}
.card{background:#fff;border-radius:22px;padding:16px;margin-bottom:22px;box-shadow:0 6px 18px rgba(0,0,0,.12);text-align:left;overflow:hidden}
.kind{display:inline-block;padding:9px 15px;border-radius:999px;font-size:18px;font-weight:900;margin-bottom:14px;background:#dfefff;color:#005bbb}
.date{font-size:16px;color:#678095;margin-bottom:14px}
.info-box{background:#f6fbff;border:1px solid #d8eaf8;border-radius:18px;padding:14px;margin-bottom:18px}
.info-label{font-size:15px;font-weight:900;color:#0c5f9c;margin-bottom:8px}
.info-text{font-size:20px;line-height:1.75;color:#17324d;text-align:left;word-break:normal;overflow-wrap:break-word}
.photo{width:100%;display:block;border-radius:20px;margin-bottom:20px;background:#d9e7f2}
.status{display:inline-block;padding:10px 16px;border-radius:999px;font-size:18px;font-weight:900;margin-top:8px}
.red{background:#ffe2e2;color:#c20000}
.yellow{background:#fff3d9;color:#9a6400}
.green{background:#def7df;color:#147a28}
.blue{background:#e1f0ff;color:#005bbb}
.map-btn{display:block;width:100%;text-align:center;text-decoration:none;background:linear-gradient(135deg,#0a84ff,#005bbb);color:#fff;font-size:23px;font-weight:900;padding:17px;border-radius:17px;margin-top:22px}
.share-box{margin-top:18px;padding-top:16px;border-top:1px solid #e0edf7}
.share-title{font-size:15px;font-weight:900;color:#45657d;margin-bottom:10px}
.share-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.share-btn{display:block;border:none;text-align:center;text-decoration:none;color:#fff;font-size:16px;font-weight:900;padding:13px 8px;border-radius:14px}
.copy-btn{background:#516a80}
.fb-btn{background:#1877f2}
.line-btn{background:#06c755}
.x-btn{background:#111}
.loading{text-align:center;font-size:26px;color:#678095;padding:50px 20px}
.error{background:#fff;border-radius:22px;padding:36px 18px;text-align:center;font-size:22px;line-height:1.8;color:#c20000}
.footer{text-align:center;color:#678095;font-size:14px;padding-top:20px}
</style>
</head>

<body>
<div class="wrap">

<img src="top.jpg" class="top-image">

<div class="title">志木パトロールDX</div>

<div class="desc">
投稿された地域情報を確認できます。<br>
道路の穴、街灯切れ、不法投棄などを一覧表示します。
</div>

<div class="nav">
<a href="index.html" class="home-btn">トップへ</a>
<a
href="https://www.appsheet.com/start/76993072-05e5-4df2-85fe-30e175d313bc#table=%E5%BF%97%E6%9C%A8%E3%83%91%E3%83%88%E3%83%AD%E3%83%BC%E3%83%ABDX&page=form&defaults=%5B%5D"
target="_blank"
class="post-btn">
通報する
</a>
</div>

<div id="list">
<div class="loading">読み込み中...</div>
</div>

<div class="footer">志木パトロールDX</div>

</div>

<script>
const SHEET_ID = '1393zzt2GgqS5v0Hsdtu-3w0ntM3ff2KG0kOOPBaxHk4';
const SHEET_NAME = '志木パトロールDX';
const BASE_URL = 'https://ichirohns-jpg.github.io/ShikiPatrolDX-001/';

function loadData(){
  const script = document.createElement('script');
  script.src =
    'https://docs.google.com/spreadsheets/d/' +
    SHEET_ID +
    '/gviz/tq?tqx=out:json;responseHandler=handlePatrolData&sheet=' +
    encodeURIComponent(SHEET_NAME) +
    '&_=' +
    Date.now();

  script.onerror = function(){
    showError('データを取得できませんでした');
  };

  document.body.appendChild(script);
}

window.handlePatrolData = function(json){
  const list = document.getElementById('list');

  if(!json || !json.table || !json.table.rows){
    showError('データ取得エラー');
    return;
  }

  let data = json.table.rows.map(function(row,index){
    const c = row.c || [];

    return {
      index:index,
      date:getCell(c,0),
      kind:getCell(c,1),
      detail:getCell(c,2),
      photoUrl:normalizeImageUrl(getCell(c,3)),
      location:getCell(c,4),
      status:getCell(c,5)
    };
  }).filter(function(item){
    return item.date || item.kind || item.detail || item.photoUrl || item.location || item.status;
  });

  if(data.length === 0){
    list.innerHTML = '<div class="error">投稿がありません</div>';
    return;
  }

  const params = new URLSearchParams(location.search);
  const id = params.get('id');

  if(id){
    const targetIndex = parseInt(id,10) - 1;
    data = data.filter(function(item){
      return item.index === targetIndex;
    });

    if(data.length === 0){
      list.innerHTML = '<div class="error">指定された投稿が見つかりません</div>';
      return;
    }
  }

  let html = '';

  data.forEach(function(item){
    const no = String(item.index + 1).padStart(3,'0');
    const shareUrl = BASE_URL + 'share-' + no + '.html';
    const statusClass = getStatusClass(item.status);

    const copyText =
      '志木パトロールDX\n' +
      (item.kind || '地域情報') + '\n' +
      (item.detail || '') + '\n' +
      shareUrl;

    const xText =
      '志木パトロールDX\n' +
      (item.kind || '地域情報') + '\n' +
      (item.detail || '地域の危険箇所を写真と地図で確認できます。');

    html += `
      <div class="card">

        <div class="kind">${escapeHtml(item.kind || '地域情報')}</div>

        <div class="date">${escapeHtml(item.date || '')}</div>

        <div class="info-box">
          <div class="info-label">内容</div>
          <div class="info-text">${escapeHtml(item.detail || '詳細内容は未入力です。')}</div>
        </div>

        ${
          item.photoUrl
          ? `<img src="${escapeAttr(item.photoUrl)}" class="photo">`
          : ''
        }

        <div class="status ${statusClass}">
          ${escapeHtml(item.status || '未対応')}
        </div>

        ${
          item.location
          ? `<a href="https://maps.google.com/?q=${encodeURIComponent(item.location)}" target="_blank" class="map-btn">Googleマップを見る</a>`
          : ''
        }

        <div class="share-box">
          <div class="share-title">この記事を共有</div>

          <div class="share-grid">

            <button
              class="share-btn copy-btn"
              onclick="copyShare('${encodeURIComponent(copyText)}')">
              URLコピー
            </button>

            <a
              class="share-btn fb-btn"
              target="_blank"
              href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}">
              Facebook
            </a>

            <a
              class="share-btn line-btn"
              target="_blank"
              href="https://line.me/R/msg/text/?${encodeURIComponent(copyText)}">
              LINE
            </a>

            <a
              class="share-btn x-btn"
              target="_blank"
              href="https://twitter.com/intent/tweet?text=${encodeURIComponent(xText)}&url=${encodeURIComponent(shareUrl)}">
              X
            </a>

          </div>
        </div>

      </div>
    `;
  });

  list.innerHTML = html;
};

function getCell(c,index){
  if(!c[index]) return '';
  if(c[index].f) return String(c[index].f).trim();
  if(c[index].v === null || c[index].v === undefined) return '';
  return String(c[index].v).trim();
}

function normalizeImageUrl(url){
  const raw = String(url || '').trim();
  if(!raw) return '';

  const driveFileMatch = raw.match(/\/file\/d\/([^/]+)/);
  if(driveFileMatch && driveFileMatch[1]){
    return 'https://drive.google.com/thumbnail?id=' + driveFileMatch[1] + '&sz=w1200';
  }

  const driveIdMatch = raw.match(/[?&]id=([^&]+)/);
  if(raw.includes('drive.google.com') && driveIdMatch && driveIdMatch[1]){
    return 'https://drive.google.com/thumbnail?id=' + driveIdMatch[1] + '&sz=w1200';
  }

  return raw;
}

function copyShare(encodedText){
  const text = decodeURIComponent(encodedText);

  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){
      alert('コピーしました');
    }).catch(function(){
      prompt('コピーしてください', text);
    });
  }else{
    prompt('コピーしてください', text);
  }
}

function getStatusClass(status){
  const s = String(status || '');
  if(s.includes('済')) return 'green';
  if(s.includes('中')) return 'yellow';
  if(s.includes('未')) return 'red';
  return 'blue';
}

function escapeHtml(str){
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function escapeAttr(str){
  return escapeHtml(str).replace(/"/g,'&quot;');
}

function showError(msg){
  document.getElementById('list').innerHTML =
    '<div class="error">' + escapeHtml(msg) + '</div>';
}

loadData();
</script>

</body>
</html>
