<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>志木パトロールDX</title>

<meta property="og:title" content="志木パトロールDX">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef3f8;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}

.hero{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  display:block;
}

.wrap{
  max-width:900px;
  margin:0 auto;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:24px;
  box-shadow:0 6px 18px rgba(0,0,0,.10);
}

.title{
  font-size:34px;
  font-weight:900;
  margin-bottom:14px;
  color:#12385f;
}

.desc{
  font-size:18px;
  line-height:1.8;
  color:#35506e;
}

.notice{
  margin-top:18px;
  padding:14px;
  background:#f1f8ff;
  border-left:5px solid #1976d2;
  border-radius:10px;
  font-size:15px;
  line-height:1.7;
}

.btn{
  display:block;
  margin-top:18px;
  padding:18px;
  border-radius:16px;
  text-align:center;
  text-decoration:none;
  font-size:20px;
  font-weight:bold;
}

.report{
  background:#1976d2;
  color:#fff;
}

.list{
  background:#fff;
  border:2px solid #1976d2;
  color:#1976d2;
}

footer{
  text-align:center;
  padding:28px 10px 50px;
  font-size:13px;
  color:#6b7c90;
}
</style>
</head>

<body>

<img class="hero" src="top.jpg" alt="志木パトロールDX">

<div class="wrap">

  <div class="card">

    <div class="title">
      志木パトロールDX
    </div>

    <div class="desc">
      地域の危険箇所や異常を、写真と位置情報で共有する地域見守りDXです。<br>
      道路の穴、街灯切れ、標識破損、不法投棄、公園の異常などを、スマートフォンから簡単に投稿できます。
    </div>

    <div class="notice">
      投稿された内容は、確認用ページで一覧表示されます。<br>
      写真・位置情報・内容をもとに、地域の小さな異常を見える化します。
    </div>

    <a class="btn report"
       href="https://YOUR-APPSHEET-LINK">
      通報する
    </a>

    <a class="btn list"
       href="app.html">
      投稿一覧を見る
    </a>

  </div>

</div>

<footer>
  Shiki Patrol DX
</footer>
