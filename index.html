<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>志木パトロールDX</title>

<style>
body{
  margin:0;
  background:#f4f7fb;
  font-family:"Hiragino Sans","Yu Gothic",sans-serif;
  color:#222;
}

header{
  background:#1976d2;
  color:#fff;
  padding:20px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
}

.sub{
  font-size:14px;
  margin-top:6px;
  opacity:.9;
}

.wrap{
  max-width:900px;
  margin:0 auto;
  padding:16px;
}

.card{
  background:#fff;
  border-radius:18px;
  padding:16px;
  margin-bottom:18px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.type{
  display:inline-block;
  background:#e3f2fd;
  color:#1565c0;
  padding:6px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:bold;
  margin-bottom:10px;
}

.title{
  font-size:20px;
  font-weight:bold;
  margin-bottom:10px;
}

.photo{
  width:100%;
  border-radius:14px;
  margin-top:12px;
}

.mapbtn{
  display:inline-block;
  margin-top:14px;
  background:#1976d2;
  color:#fff;
  padding:10px 16px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}

.status{
  margin-top:12px;
  font-size:14px;
  color:#666;
}
</style>
</head>

<body>

<header>
  志木パトロールDX
  <div class="sub">
    地域の危険箇所・異常報告確認ページ
  </div>
</header>

<div class="wrap">

  <div class="card">

    <div class="type">
      標識破損
    </div>

    <div class="title">
      標識が曲がっている
    </div>

    <div>
      通学路の標識が大きく傾いています。
    </div>

    <img class="photo"
    src="https://placehold.jp/800x500.png">

    <br>

    <a class="mapbtn"
    href="#">

      Googleマップを見る

    </a>

    <div class="status">
      対応状況：未対応
    </div>

  </div>

</div>

</body>
</html>
