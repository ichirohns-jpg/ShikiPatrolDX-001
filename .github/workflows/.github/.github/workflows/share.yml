name: Generate share pages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate share pages
        run: |
          cat > share-001.html <<'EOF'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>志木パトロールDX｜地域情報</title>
          <meta name="description" content="地域の危険箇所を写真と地図で確認できます。">
          <meta property="og:title" content="志木パトロールDX｜地域情報">
          <meta property="og:description" content="地域の危険箇所を写真と地図で確認できます。">
          <meta property="og:type" content="article">
          <meta property="og:site_name" content="志木パトロールDX">
          <meta property="og:url" content="https://ichirohns-jpg.github.io/ShikiPatrolDX-001/share-001.html">
          <meta property="og:image" content="https://ichirohns-jpg.github.io/ShikiPatrolDX-001/ogp.jpg">
          <meta property="og:image:width" content="1200">
          <meta property="og:image:height" content="630">
          <meta property="og:locale" content="ja_JP">
          <meta name="twitter:card" content="summary_large_image">
          <meta name="twitter:title" content="志木パトロールDX｜地域情報">
          <meta name="twitter:description" content="地域の危険箇所を写真と地図で確認できます。">
          <meta name="twitter:image" content="https://ichirohns-jpg.github.io/ShikiPatrolDX-001/ogp.jpg">
          <meta http-equiv="refresh" content="0; url=https://ichirohns-jpg.github.io/ShikiPatrolDX-001/app.html?id=1">
          </head>
          <body>志木パトロールDX</body>
          </html>
          EOF

      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add share-*.html
          git commit -m "Generate share pages" || echo "No changes"
          git push
