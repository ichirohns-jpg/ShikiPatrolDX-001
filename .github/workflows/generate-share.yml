name: Generate Share Pages

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate share pages
        run: |

          for i in $(seq -w 1 30)
          do

            cat > share-${i}.html <<EOF
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>志木パトロールDX｜投稿${i}</title>

<meta property="og:type" content="website">

<meta property="og:title" content="志木パトロールDX｜投稿${i}">

<meta property="og:description" content="志木市内の地域見守り情報ページです。">

<meta property="og:url" content="https://ichirohns-jpg.github.io/ShikiPatrolDX-001/share-${i}.html">

<meta property="og:image" content="https://ichirohns-jpg.github.io/ShikiPatrolDX-001/ogp.jpg">

<meta name="twitter:card" content="summary_large_image">

<meta name="twitter:image" content="https://ichirohns-jpg.github.io/ShikiPatrolDX-001/ogp.jpg">

<meta http-equiv="refresh" content="0;url=https://ichirohns-jpg.github.io/ShikiPatrolDX-001/app.html?id=${i}">

</head>

<body>
Redirect...
</body>

</html>
EOF

          done

      - name: Commit files
        run: |

          git config --global user.name "github-actions"

          git config --global user.email "actions@github.com"

          git add .

          git commit -m "Auto generate share pages" || echo "No changes"

          git push
